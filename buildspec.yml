version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci
  build:
    commands:
      - npm run build
  post_build:
    commands:
      - cp appspec.yml dist/appspec.yml
      - cp -r scripts dist/scripts
      - echo "Build completed on $(date)"
artifacts:
  base-directory: dist
  files:
    - '**/*'
